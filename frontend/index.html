<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PERT/CPM Tool</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header class="app-header">
        <div class="header-row">
            <h1 class="app-title">PERT/CPM Tool</h1>
            <div class="project-name-group">
                <label for="project-name" class="project-label">Project</label>
                <input
                    type="text"
                    id="project-name"
                    class="project-name-input"
                    placeholder="Enter project name…"
                    autocomplete="off"
                >
            </div>
            <button id="btn-finished" class="btn-primary">Finished</button>
        </div>
    </header>

    <main class="app-main">
        <section class="input-section">
            <div id="error-banner" class="error-banner hidden" role="alert"></div>

            <p id="activities-empty" class="activities-empty">No activities yet — start typing to add one</p>

            <div class="table-wrap">
                <table id="activity-table" class="activity-table">
                    <thead>
                        <tr>
                            <th class="col-letter">Letter</th>
                            <th class="col-description">Description</th>
                            <th class="col-prereqs">Prerequisites</th>
                            <th class="col-duration">Duration (days)</th>
                            <th class="col-cost">Cost/day (R$)</th>
                            <th class="col-actions"></th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>

        <section id="diagram-section" class="diagram-section hidden">
            <h2 class="section-title">Activity-on-Arrow Diagram</h2>
            <div id="diagram-container" class="diagram-container"></div>
        </section>

        <section id="summary-section" class="summary-section hidden"></section>
    </main>

    <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
    <script type="module" src="/app.js"></script>
</body>
</html>
